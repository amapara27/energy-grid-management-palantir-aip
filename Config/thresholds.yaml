# Risk scoring thresholds, alerting rules, retry settings, and audit retention config
# Referenced by: Risk_Scoring, Smart_Alerting, ERP_Writeback, Data_Ingestion, Audit_Logger

risk_scoring:
  oil_temp_threshold_c: 90
  oil_temp_points: 40
  age_threshold_years: 20
  age_points: 20
  wind_speed_threshold_mph: 40
  wind_points: 25
  red_flag_points: 15
  max_score: 100

alerting:
  risk_threshold: 70
  critical_threshold: 90
  priority_map:
    critical: 90   # score >= 90 → Critical
    high: 70        # score >= 70 → High

erp_writeback:
  max_retries: 3
  initial_backoff_ms: 1000
  backoff_multiplier: 2

data_ingestion:
  max_retries: 3
  initial_backoff_ms: 500
  backoff_multiplier: 2

audit:
  retention_years: 7
