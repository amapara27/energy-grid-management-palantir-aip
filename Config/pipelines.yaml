pipelines:
  scada_telemetry:
    type: streaming
    source: scada_osi_pi
    target: Data/Raw/scada_telemetry
    schedule: continuous

  gis_assets:
    type: batch
    source: gis_platform
    target: Data/Raw/gis_assets
    schedule: daily_0200

  weather_forecasts:
    type: batch
    source: tomorrow_io_api
    target: Data/Raw/weather_forecasts
    schedule: every_6h

  maintenance_history:
    type: batch
    source: sap_pm
    target: Data/Raw/maintenance_history
    schedule: daily_0300
