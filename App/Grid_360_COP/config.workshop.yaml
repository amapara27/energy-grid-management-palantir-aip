# Grid 360 Common Operating Picture — Workshop Configuration
# @see Requirements 5.1, 5.2, 5.3, 5.4, 5.5

app:
  name: Grid 360 COP
  description: >
    Unified common operating picture for grid operators combining an interactive
    transformer map, asset table, action inbox, and KPI banner.
  version: 0.1.0

layout:
  widgets:
    - id: map-widget
      type: MapWidget
      source: widgets/MapWidget.ts
      position: top-left

    - id: object-table
      type: ObjectTable
      source: widgets/ObjectTable.ts
      position: bottom-left

    - id: action-inbox
      type: ActionInbox
      source: widgets/ActionInbox.ts
      position: top-right

    - id: kpi-banner
      type: KPIBanner
      source: widgets/KPIBanner.ts
      position: banner

  actions:
    - id: approve-work-order
      source: actions/ApproveWorkOrder.ts
    - id: reject-work-order
      source: actions/RejectWorkOrder.ts

  filters:
    - id: grid-filters
      source: filters/GridFilters.ts
